name: 🐹 lint

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".mise.toml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: docker://morphy/revive-action:v2

      - name: git config for credimi-extra
        env:
          CREDIMI_EXTRA_PAT: ${{ secrets.CREDIMI_EXTRA_PAT }}
        shell: bash
        run: |
          git config --global url."https://x-access-token:${CREDIMI_EXTRA_PAT}@github.com/ForkbombEu/credimi-extra".insteadOf "https://github.com/forkbombeu/credimi-extra"

      - name: Install govulncheck
        shell: bash
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (text output for logs)
        shell: bash
        run: |
          set -euo pipefail
          govulncheck -C . -format text ./... | tee govulncheck.txt || true

      - name: Run govulncheck (JSON for filtering)
        shell: bash
        run: |
          set -euo pipefail
          govulncheck -C . -format json ./... > govulncheck.json || true

      - name: Run govulncheck (SARIF for code scanning)
        shell: bash
        run: |
          set -euo pipefail
          govulncheck -C . -format sarif ./... > govulncheck.sarif || true

      - name: Upload govulncheck SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: govulncheck.sarif

      - name: Enforce govulncheck (ignore selected vulns)
        shell: bash
        run: |
          set -euo pipefail

          IGNORE_IDS=(
            "GO-2026-4887"
            "GO-2026-4883"
            "GO-2026-4514"
            "GO-2026-4762"
          )

          echo "Ignored vulnerability IDs:"
          printf ' - %s\n' "${IGNORE_IDS[@]}"

          echo
          echo "All finding IDs:"
          jq -r '
            select(.finding != null)
            | .finding.osv
          ' govulncheck.json | sort -u

          JQ_FILTER='select(.finding != null) | .finding.osv'
          for id in "${IGNORE_IDS[@]}"; do
            JQ_FILTER="$JQ_FILTER | select(. != \"$id\")"
          done

          NON_IGNORED="$(jq -r "$JQ_FILTER" govulncheck.json | sort -u)"

          echo
          echo "Full govulncheck report:"
          cat govulncheck.txt

          if [ -n "${NON_IGNORED}" ]; then
            echo
            echo "❌ Vulnerabilities found (excluding ignored ones):"
            printf '%s\n' "${NON_IGNORED}"
            exit 1
          fi

          echo
          echo "✅ Only ignored vulnerabilities present"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      ROOT_DIR: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4

      - name: git config for credimi-extra
        env:
          CREDIMI_EXTRA_PAT: ${{ secrets.CREDIMI_EXTRA_PAT }}
        shell: bash
        run: |
          git config --global url."https://x-access-token:${CREDIMI_EXTRA_PAT}@github.com/ForkbombEu/credimi-extra".insteadOf "https://github.com/forkbombeu/credimi-extra"

      - name: Run go tests
        run: make test
