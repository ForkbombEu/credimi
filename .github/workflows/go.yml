name: 🐹 Go checks

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".mise.toml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.5

      - uses: docker://morphy/revive-action:v2

      - name: git config for credimi-extra
        env:
          CREDIMI_EXTRA_PAT: ${{ secrets.CREDIMI_EXTRA_PAT }}
        shell: bash
        run: |
          git config --global url."https://x-access-token:${CREDIMI_EXTRA_PAT}@github.com/ForkbombEu/credimi-extra".insteadOf "https://github.com/forkbombeu/credimi-extra"

      - name: Install govulncheck
        shell: bash
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Check module hygiene
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy -diff

      - name: Verify modules
        shell: bash
        run: |
          set -euo pipefail
          go mod verify

      - name: Vet
        shell: bash
        run: |
          set -euo pipefail
          go vet ./...

      - name: Verify credimi_extra build
        shell: bash
        run: |
          set -euo pipefail
          go build -tags=credimi_extra ./...

      - name: Run govulncheck (text output for logs)
        shell: bash
        run: |
          set -euo pipefail
          govulncheck -C . -format text ./... | tee govulncheck.txt || true

      - name: Run govulncheck (JSON for filtering)
        shell: bash
        run: |
          set -euo pipefail
          govulncheck -C . -format json ./... > govulncheck.json || true

      - name: Run govulncheck (SARIF for code scanning)
        shell: bash
        run: |
          set -euo pipefail
          govulncheck -C . -format sarif ./... > govulncheck.sarif || true

      - name: Upload govulncheck SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: govulncheck.sarif

      - name: Enforce govulncheck
        shell: bash
        run: |
          set -euo pipefail

          echo "Full govulncheck report:"
          cat govulncheck.txt

          REACHABLE_FINDINGS="$(jq -r '
            select(.finding != null)
            | select((.finding.trace // []) | length > 0)
            | .finding.osv
          ' govulncheck.json | sort -u)"

          MODULE_ONLY_FINDINGS="$(jq -r '
            select(.finding != null)
            | select(((.finding.trace // []) | length) == 0)
            | .finding.osv
          ' govulncheck.json | sort -u)"

          echo
          echo "Reachable finding IDs:"
          if [ -n "${REACHABLE_FINDINGS}" ]; then
            printf '%s\n' "${REACHABLE_FINDINGS}"
          else
            echo "None"
          fi

          echo
          echo "Module-only finding IDs:"
          if [ -n "${MODULE_ONLY_FINDINGS}" ]; then
            printf '%s\n' "${MODULE_ONLY_FINDINGS}"
          else
            echo "None"
          fi

          if [ -n "${REACHABLE_FINDINGS}" ]; then
            echo
            echo "❌ Reachable vulnerabilities found:"
            printf '%s\n' "${REACHABLE_FINDINGS}"
            exit 1
          fi

          echo
          echo "✅ No reachable vulnerabilities found"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    env:
      ROOT_DIR: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: jdx/mise-action@v4

      - name: git config for credimi-extra
        env:
          CREDIMI_EXTRA_PAT: ${{ secrets.CREDIMI_EXTRA_PAT }}
        shell: bash
        run: |
          git config --global url."https://x-access-token:${CREDIMI_EXTRA_PAT}@github.com/ForkbombEu/credimi-extra".insteadOf "https://github.com/forkbombeu/credimi-extra"

      - name: Run go tests
        run: make test
