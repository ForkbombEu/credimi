name: 📢 Release
on:
  push:
    branches:
      - main
    paths:
      - "VERSION"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  trigger_deploy:
    name: 🗞️  Trigger new deploy
    runs-on: ubuntu-latest
    env:
      COOLIFY_CREDIMI_WEBHOOK_URL: ${{ secrets.COOLIFY_CREDIMI_WEBHOOK_URL }}
      COOLIFY_WEBHOOK_TOKEN: ${{ secrets.COOLIFY_WEBHOOK_TOKEN }}
    steps:
      - name: Trigger Coolify deploy
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${COOLIFY_CREDIMI_WEBHOOK_URL:-}" || -z "${COOLIFY_WEBHOOK_TOKEN:-}" ]]; then
            echo "Coolify webhook secrets are not set; skipping deploy trigger."
            exit 0
          fi
          curl -fsS --request GET "${COOLIFY_CREDIMI_WEBHOOK_URL}" \
            --header "Authorization: Bearer ${COOLIFY_WEBHOOK_TOKEN}"

  release:
    name: 🔖 Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false
      - uses: jdx/mise-action@v2
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2.15"
          install-only: true
      - uses: sigstore/cosign-installer@v3.8.1
      - uses: anchore/sbom-action/download-syft@v0.18.0
      - name: git config for credimi-extra
        env:
          CREDIMI_EXTRA_PAT: ${{ secrets.CREDIMI_EXTRA_PAT }}
        run: |
          git config --global url."https://x-access-token:${CREDIMI_EXTRA_PAT}@github.com/ForkbombEu/credimi-extra".insteadOf "https://github.com/forkbombeu/credimi-extra"
        shell: bash
      - uses: go-semantic-release/action@v1
        with:
          hooks: goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: ./dist/checksums.txt

  publish_docker_image:
    name: 🐳 Publish Docker image
    needs: release
    if: github.ref == 'refs/heads/main'
    uses: ForkbombEu/workflows/.github/workflows/publish-ghcr.yml@main
    secrets: inherit
