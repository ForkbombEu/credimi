test: oid4vp-1final-wallet-optional-credential-set
name: OpenID4VP Wallet Optional Credential Set
description: |
  Sends a DCQL query with two credential entries wrapped in credential_sets: the real credential is required,
  and a second non-matching credential is optional. The wallet should return only the real credential and not fail
  the request due to the unmatchable optional entry. The DCQL configuration must not already contain credential_sets.
