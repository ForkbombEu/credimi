id: WS_RP_IA_ProtocolFlow__001
title: Verify Request Object retrieval using request_uri_method=post.
source:
  path: Interaction/ProtocolFlow/WS_RP_IA_ProtocolFlow__001.md
suite:
  sut: wallet_solution
  role: relying_party
  section: interaction.protocol_flow
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "5.10.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.wallet.protocol.request-uri-method-post
evidence:
  presentation_request:
    from: pipeline.wallet.protocol.request-uri-method-post.outputs.presentation_request
  wallet_response:
    from: pipeline.wallet.protocol.request-uri-method-post.outputs.wallet_response
assertions:
  - id: request_uri_method_is_post
    validator: json.field_equals
    input: evidence.presentation_request
    params:
      field: request_uri_method
      value: post
  - id: authorization_response_posted
    validator: json.field_required
    input: evidence.wallet_response
    params:
      field: vp_token
verdict:
  pass_when: all_assertions_pass
