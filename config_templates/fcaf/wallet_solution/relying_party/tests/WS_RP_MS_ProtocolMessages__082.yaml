id: WS_RP_MS_ProtocolMessages__082
title: Accept a DCQL credential query without claims.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__082.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.claims-omitted
evidence:
  dcql_exchange:
    from: pipeline.dcql.claims-omitted.outputs.dcql_exchange
  visual_evidence:
    from: pipeline.dcql.claims-omitted.outputs.visual_evidence
assertions:
  - id: omitted_claims_does_not_invalidate_credential
    validator: dcql.response_satisfies_constraints
    input: evidence.dcql_exchange
    params:
      mode: without_claims
  - id: successful_wallet_interaction_is_stored
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
