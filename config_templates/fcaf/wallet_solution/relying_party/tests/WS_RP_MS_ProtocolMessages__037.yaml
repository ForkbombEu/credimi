id: WS_RP_MS_ProtocolMessages__037
title: Verify a vp_token response excludes OAuth grant parameters.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__037.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "5.6"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.wallet.protocol.request-object-by-value
evidence:
  request_object:
    from: pipeline.wallet.protocol.request-object-by-value.outputs.request_object
  wallet_response:
    from: pipeline.wallet.protocol.request-object-by-value.outputs.wallet_response
assertions:
  - id: response_type_is_vp_token
    validator: jwt.payload_field_equals
    input: evidence.request_object
    params:
      field: response_type
      value: vp_token
  - id: response_contains_vp_token
    validator: json.field_presence
    input: evidence.wallet_response
    params:
      field: vp_token
      present: true
  - id: response_excludes_authorization_code
    validator: json.field_presence
    input: evidence.wallet_response
    params:
      field: code
      present: false
  - id: response_excludes_access_token
    validator: json.field_presence
    input: evidence.wallet_response
    params:
      field: access_token
      present: false
  - id: response_excludes_token_type
    validator: json.field_presence
    input: evidence.wallet_response
    params:
      field: token_type
      present: false
verdict:
  pass_when: all_assertions_pass
