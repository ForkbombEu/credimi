id: WS_RP_IA_MainInteraction__007
title: Process a DCQL query without requiring cryptographic holder binding.
source:
  path: Interaction/MainInteraction/WS_RP_IA_MainInteraction__007.md
suite:
  sut: wallet_solution
  role: relying_party
  section: interaction.main_interaction
applicability:
  profile: EUDI_generic
  credential_format: ietf_sd_jwt_vc
normative_references:
  - title: OpenID for Verifiable Presentations
    section: "6.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.holder-binding-type-boundary
evidence:
  holder_binding_exchange:
    from: pipeline.dcql.holder-binding-type-boundary.outputs.exchange_valid_false
  pid_sdjwt_presentations:
    from: pipeline.dcql.holder-binding-type-boundary.outputs.pid_sdjwt_presentations_valid_false
  visual_evidence:
    from: pipeline.dcql.holder-binding-type-boundary.outputs.visual_evidence
assertions:
  - id: wallet_processes_query_without_holder_binding_requirement
    validator: dcql.response_satisfies_constraints
    input: evidence.holder_binding_exchange
    params:
      mode: property_equals
      property: require_cryptographic_holder_binding
      expected_value: false
  - id: wallet_presents_cryptographically_bound_sdjwt
    validator: sdjwt.cnf_conforms
    input: evidence.pid_sdjwt_presentations
  - id: user_consent_evidence_exists
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
