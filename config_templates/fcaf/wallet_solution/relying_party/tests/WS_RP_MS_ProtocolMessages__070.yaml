id: WS_RP_MS_ProtocolMessages__070
title: Verify omitted DCQL multiple defaults to false.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__070.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.credentials-match
evidence:
  dcql_exchange:
    from: pipeline.dcql.credentials-match.outputs.dcql_exchange
  visual_evidence:
    from: pipeline.dcql.credentials-match.outputs.visual_evidence
assertions:
  - id: omitted_multiple_returns_one_credential
    validator: dcql.response_satisfies_constraints
    input: evidence.dcql_exchange
    params:
      mode: multiple_default_false
  - id: wallet_interaction_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
