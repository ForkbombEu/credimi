id: WS_RP_IA_MainInteraction__012
title: Present only the claims requested by the verifier.
source:
  path: Interaction/MainInteraction/WS_RP_IA_MainInteraction__012.md
suite:
  sut: wallet_solution
  role: relying_party
  section: interaction.main_interaction
applicability:
  profile: EUDI_generic
  credential_format: ietf_sd_jwt_vc
normative_references:
  - title: OpenID for Verifiable Presentations
    section: "6.4"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.claims-without-id-without-claim-sets
evidence:
  dcql_exchange:
    from: pipeline.dcql.claims-without-id-without-claim-sets.outputs.dcql_exchange
  visual_evidence:
    from: pipeline.dcql.claims-without-id-without-claim-sets.outputs.visual_evidence
assertions:
  - id: requested_claims_are_present_in_the_returned_presentation
    validator: dcql.response_satisfies_constraints
    input: evidence.dcql_exchange
    params:
      mode: claims_present
  - id: consent_screen_proves_only_name_is_displayed
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
