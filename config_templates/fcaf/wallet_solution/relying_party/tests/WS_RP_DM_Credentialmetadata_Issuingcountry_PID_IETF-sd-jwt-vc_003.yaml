id: WS_RP_DM_Credentialmetadata_Issuingcountry_PID_IETF-sd-jwt-vc_003
title: This test case verifies that the value of the claim `issuing_country` contains a valid country code. Note that `issuing_country` is the Attribute Identifier in IETF SD-JWT VC for the Data Identifier issuing_country.
source:
    path: DataModel/CredentialMetadata/WS_RP_DM_Credentialmetadata_Issuingcountry_PID_IETF-sd-jwt-vc_003.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.credential_metadata
applicability:
    credential_format: ietf_sd_jwt_vc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_issuingcountry_pid_ietf-sd-jwt-vc_003
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.2 (Table 5).'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_issuingcountry_pid_ietf-sd-jwt-vc_003
    - title: ISO 3166-1:2020, 6.1 ISO 3166-1:2020, 8.3
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_issuingcountry_pid_ietf-sd-jwt-vc_003
