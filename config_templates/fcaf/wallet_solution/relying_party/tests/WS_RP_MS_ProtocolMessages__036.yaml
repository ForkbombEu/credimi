id: WS_RP_MS_ProtocolMessages__036
title: Verify a vp_token request produces a vp_token response.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__036.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "5.6"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.wallet.protocol.request-object-by-value
  - ref: pipeline.dcql.credentials-match
  - ref: pipeline.dcql.credential-sets
  - ref: pipeline.dcql.claim-sets
evidence:
  request_object:
    from: pipeline.wallet.protocol.request-object-by-value.outputs.request_object
  wallet_response:
    from: pipeline.wallet.protocol.request-object-by-value.outputs.wallet_response
  multiple_credentials_exchange:
    from: pipeline.dcql.credentials-match.outputs.dcql_exchange
  credential_sets_exchange:
    from: pipeline.dcql.credential-sets.outputs.dcql_exchange
  claim_sets_exchange:
    from: pipeline.dcql.claim-sets.outputs.dcql_exchange
  by_value_visual_evidence:
    from: pipeline.wallet.protocol.request-object-by-value.outputs.visual_evidence
  multiple_credentials_visual_evidence:
    from: pipeline.dcql.credentials-match.outputs.visual_evidence
  credential_sets_visual_evidence:
    from: pipeline.dcql.credential-sets.outputs.visual_evidence
  claim_sets_visual_evidence:
    from: pipeline.dcql.claim-sets.outputs.visual_evidence
assertions:
  - id: response_type_is_vp_token
    validator: jwt.payload_field_equals
    input: evidence.request_object
    params:
      field: response_type
      value: vp_token
  - id: response_contains_vp_token
    validator: json.field_required
    input: evidence.wallet_response
    params:
      field: vp_token
  - id: multiple_credentials_query_produces_vp_token
    validator: dcql.response_satisfies_constraints
    input: evidence.multiple_credentials_exchange
    params:
      mode: credentials_match
  - id: credential_sets_query_produces_vp_token
    validator: dcql.response_satisfies_constraints
    input: evidence.credential_sets_exchange
    params:
      mode: credential_sets
  - id: claim_sets_query_produces_vp_token
    validator: dcql.response_satisfies_constraints
    input: evidence.claim_sets_exchange
    params:
      mode: claim_sets
  - id: by_value_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.by_value_visual_evidence
  - id: multiple_credentials_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.multiple_credentials_visual_evidence
  - id: credential_sets_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.credential_sets_visual_evidence
  - id: claim_sets_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.claim_sets_visual_evidence
verdict:
  pass_when: all_assertions_pass
