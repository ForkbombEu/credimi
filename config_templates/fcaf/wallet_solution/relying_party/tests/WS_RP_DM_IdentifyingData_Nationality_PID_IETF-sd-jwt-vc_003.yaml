id: WS_RP_DM_IdentifyingData_Nationality_PID_IETF-sd-jwt-vc_003
title: This test case verifies that each string within the array of strings in the claim `nationalities` contains a valid country code. Note that `nationalities` is the Attribute Identifier in IETF SD-JWT VC for the Data Identifier nationality.
source:
    path: DataModel/IdentifyingData/WS_RP_DM_IdentifyingData_Nationality_PID_IETF-sd-jwt-vc_003.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.identifying_data
applicability:
    credential_format: ietf_sd_jwt_vc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook, paragraph 3.1.2
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_nationality_pid_ietf-sd-jwt-vc_003
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.2 item 3 (Table 7).'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_nationality_pid_ietf-sd-jwt-vc_003
    - title: ISO 3166-1:2020, 6.1 ISO 3166-1:2020, 8.3
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_nationality_pid_ietf-sd-jwt-vc_003
preconditions:
    - ref: pipeline.pid.presentation.sdjwt.all-claims
    - ref: assertion.pid.presentation.sdjwt.vct-pid
    - ref: assertion.pid.presentation.sdjwt.required-mandatory-claims-presented
    - ref: test.WS_RP_DM_IdentifyingData_Nationality_PID_IETF-sd-jwt-vc_001
evidence:
    pid_sdjwt:
        from: pipeline.pid.presentation.sdjwt.all-claims.outputs.pid_sdjwt
assertions:
    - id: nationalities_countries
      validator: sdjwt.claim_country_code_array
      input: evidence.pid_sdjwt
      params:
        claim: nationalities
        min_items: 1
verdict:
    pass_when: all_assertions_pass
