id: WS_RP_MS_ProtocolMessages__067
title: Verify supported DCQL credential formats are accepted.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__067.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1, Appendix B"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
  - title: OpenID4VP High Assurance Interoperability Profile 1.0
    url: https://openid.net/specs/openid4vp-high-assurance-interoperability-profile-1_0.html
preconditions:
  - ref: pipeline.dcql.valid-id-alphanumeric
  - ref: pipeline.dcql.format-mso-mdoc
evidence:
  sdjwt_exchange:
    from: pipeline.dcql.valid-id-alphanumeric.outputs.dcql_exchange
  mdoc_exchange:
    from: pipeline.dcql.format-mso-mdoc.outputs.dcql_exchange
assertions:
  - id: dc_sd_jwt_format_is_processed
    validator: dcql.response_satisfies_constraints
    input: evidence.sdjwt_exchange
    params:
      mode: credentials_match
  - id: mso_mdoc_format_is_processed
    validator: dcql.response_satisfies_constraints
    input: evidence.mdoc_exchange
    params:
      mode: credentials_match
verdict:
  pass_when: all_assertions_pass
