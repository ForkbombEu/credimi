id: WS_RP_MS_ProtocolMessages__073
title: Verify DCQL meta constrains credential matching.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__073.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.valid-id-alphanumeric
  - ref: pipeline.dcql.meta-vct-mismatch
evidence:
  matching_meta_exchange:
    from: pipeline.dcql.valid-id-alphanumeric.outputs.dcql_exchange
  mismatching_meta_exchange:
    from: pipeline.dcql.meta-vct-mismatch.outputs.dcql_exchange
  matching_meta_visual_evidence:
    from: pipeline.dcql.valid-id-alphanumeric.outputs.visual_evidence
  mismatching_meta_visual_evidence:
    from: pipeline.dcql.meta-vct-mismatch.outputs.visual_evidence
assertions:
  - id: matching_vct_meta_returns_credential
    validator: dcql.response_satisfies_constraints
    input: evidence.matching_meta_exchange
    params:
      mode: credentials_match
  - id: mismatching_vct_meta_returns_no_credential
    validator: dcql.response_satisfies_constraints
    input: evidence.mismatching_meta_exchange
    params:
      mode: no_match
  - id: matching_meta_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.matching_meta_visual_evidence
  - id: mismatching_meta_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.mismatching_meta_visual_evidence
verdict:
  pass_when: all_assertions_pass
