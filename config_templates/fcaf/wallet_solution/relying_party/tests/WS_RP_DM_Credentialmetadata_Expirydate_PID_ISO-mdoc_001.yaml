id: WS_RP_DM_Credentialmetadata_Expirydate_PID_ISO-mdoc_001
title: This test case verifies that the data element `expiry_date` is present in the mdoc data. Note that `expiry_date` is the Attribute Identifier in ISO-mdoc for the Data Identifier expiry_date.
source:
    path: DataModel/CredentialMetadata/WS_RP_DM_Credentialmetadata_Expirydate_PID_ISO-mdoc_001.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.credential_metadata
applicability:
    credential_format: iso_mdoc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_expirydate_pid_iso-mdoc_001
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.1 (Table 5).'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_expirydate_pid_iso-mdoc_001
preconditions:
    - ref: pipeline.pid.presentation.mdoc.all-claims-elements
    - ref: assertion.pid.presentation.mdoc.doc-type-pid
    - ref: assertion.pid.presentation.mdoc.required-mandatory-elements-presented
evidence:
    pid_mdoc:
        from: pipeline.pid.presentation.mdoc.all-claims-elements.outputs.pid_mdoc
assertions:
    - id: expiry_date_present
      validator: mdoc.namespace_element_present
      input: evidence.pid_mdoc
      params:
        element: expiry_date
        namespace: eu.europa.ec.eudi.pid.1
verdict:
    pass_when: all_assertions_pass
