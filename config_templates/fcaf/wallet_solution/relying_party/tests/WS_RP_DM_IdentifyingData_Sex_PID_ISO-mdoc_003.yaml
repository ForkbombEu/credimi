id: WS_RP_DM_IdentifyingData_Sex_PID_ISO-mdoc_003
title: This test case verifies that the DataElementValue of data element `sex` contains a valid value.  Note that `sex` is the Attribute Identifier in ISO-mdoc for the Data Identifier sex.
source:
    path: DataModel/IdentifyingData/WS_RP_DM_IdentifyingData_Sex_PID_ISO-mdoc_003.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.identifying_data
applicability:
    credential_format: iso_mdoc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_sex_pid_iso-mdoc_003
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.1 (Table 6).'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_sex_pid_iso-mdoc_003
    - title: ISO/IEC 5218:2004, 2
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_sex_pid_iso-mdoc_003
preconditions:
    - ref: pipeline.pid.presentation.mdoc.all-claims-elements
    - ref: assertion.pid.presentation.mdoc.doc-type-pid
    - ref: assertion.pid.presentation.mdoc.required-mandatory-elements-presented
    - ref: test.WS_RP_DM_IdentifyingData_Sex_PID_ISO-mdoc_001
evidence:
    pid_mdoc:
        from: pipeline.pid.presentation.mdoc.all-claims-elements.outputs.pid_mdoc
assertions:
    - id: sex_allowed
      validator: mdoc.element_unsigned_integer_allowed
      input: evidence.pid_mdoc
      params:
        allowed:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 9
        element: sex
        namespace: eu.europa.ec.eudi.pid.1
verdict:
    pass_when: all_assertions_pass
