id: WS_RP_DM_CredentialMetadata_CredentialStructure_008
title: The wallet matches every DCQL credentials entry
source:
  path: DataModel/CredentialMetadata/WS_RP_DM_CredentialMetadata_CredentialStructure_008.md
suite:
  sut: wallet_solution
  role: relying_party
  section: data_model.credential_metadata
applicability:
  protocol: oid4vp
normative_references:
  - title: OID4VP section 6
    url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_credentialstructure_008
preconditions:
