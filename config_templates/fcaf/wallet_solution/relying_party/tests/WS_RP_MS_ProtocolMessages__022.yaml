id: WS_RP_MS_ProtocolMessages__022
title: Verify Request Object retrieval using request_uri_method=get.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__022.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OAuth 2.0 JWT-Secured Authorization Request
    url: https://www.rfc-editor.org/rfc/rfc9101
  - title: OpenID for Verifiable Presentations 1.0
    section: "5.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.wallet.protocol.request-uri-method-get
evidence:
  presentation_request:
    from: pipeline.wallet.protocol.request-uri-method-get.outputs.presentation_request
  wallet_response:
    from: pipeline.wallet.protocol.request-uri-method-get.outputs.wallet_response
assertions:
  - id: request_uri_method_is_get
    validator: json.field_equals
    input: evidence.presentation_request
    params:
      field: request_uri_method
      value: get
  - id: referenced_request_object_is_processed
    validator: json.field_required
    input: evidence.wallet_response
    params:
      field: vp_token
verdict:
  pass_when: all_assertions_pass
