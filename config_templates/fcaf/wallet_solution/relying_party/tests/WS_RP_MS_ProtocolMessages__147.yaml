id: WS_RP_MS_ProtocolMessages__147
title: Return access_denied when no requested credential is available.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__147.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "8.5"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.no-matching-credentials
evidence:
  dcql_exchange:
    from: pipeline.dcql.no-matching-credentials.outputs.dcql_exchange
  visual_evidence:
    from: pipeline.dcql.no-matching-credentials.outputs.visual_evidence
assertions:
  - id: no_unmatched_credential_is_returned
    validator: dcql.response_satisfies_constraints
    input: evidence.dcql_exchange
    params: { mode: no_match }
  - id: error_is_exactly_access_denied
    validator: json.field_equals
    input: evidence.dcql_exchange
    params: { field: error, value: access_denied }
  - id: no_credential_row_is_shown
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
