id: WS_RP_MS_ProtocolMessages__080
title: Verify a DCQL credential query without trusted_authorities is accepted.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__080.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.valid-id-alphanumeric
evidence:
  dcql_exchange:
    from: pipeline.dcql.valid-id-alphanumeric.outputs.dcql_exchange
  visual_evidence:
    from: pipeline.dcql.valid-id-alphanumeric.outputs.visual_evidence
assertions:
  - id: omitted_trusted_authorities_does_not_invalidate_credential
    validator: dcql.response_satisfies_constraints
    input: evidence.dcql_exchange
    params:
      mode: without_trusted_authorities
  - id: wallet_interaction_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
