id: WS_RP_MS_ProtocolMessages__071
title: Verify DCQL multiple=true returns multiple credentials.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__071.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.multiple-true
evidence:
  dcql_exchange:
    from: pipeline.dcql.multiple-true.outputs.dcql_exchange
  visual_evidence:
    from: pipeline.dcql.multiple-true.outputs.visual_evidence
assertions:
  - id: multiple_true_returns_multiple_credentials
    validator: dcql.response_satisfies_constraints
    input: evidence.dcql_exchange
    params:
      mode: multiple_true
  - id: credential_selection_visual_evidence_is_stored
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
