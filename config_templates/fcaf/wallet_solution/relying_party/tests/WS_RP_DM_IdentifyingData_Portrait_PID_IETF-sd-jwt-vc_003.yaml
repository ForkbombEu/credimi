id: WS_RP_DM_IdentifyingData_Portrait_PID_IETF-sd-jwt-vc_003
title: This test case verifies that the claim `picture` is a data URL containing a base64-encoded `picture` in JPEG format. Note that `picture` is the Attribute Identifier in IETF SD-JWT VC for the Data Identifier portrait.
source:
    path: DataModel/IdentifyingData/WS_RP_DM_IdentifyingData_Portrait_PID_IETF-sd-jwt-vc_003.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.identifying_data
applicability:
    credential_format: ietf_sd_jwt_vc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_portrait_pid_ietf-sd-jwt-vc_003
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.2 (Table 7).'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_portrait_pid_ietf-sd-jwt-vc_003
preconditions:
    - ref: pipeline.pid.presentation.sdjwt.all-claims
    - ref: assertion.pid.presentation.sdjwt.vct-pid
    - ref: assertion.pid.presentation.sdjwt.required-mandatory-claims-presented
    - ref: test.WS_RP_DM_IdentifyingData_Portrait_PID_IETF-sd-jwt-vc_001
evidence:
    pid_sdjwt:
        from: pipeline.pid.presentation.sdjwt.all-claims.outputs.pid_sdjwt
assertions:
    - id: picture_jpeg
      validator: sdjwt.claim_jpeg_data_url
      input: evidence.pid_sdjwt
      params:
        claim: picture
verdict:
    pass_when: all_assertions_pass
