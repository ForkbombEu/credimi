id: WS_RP_MS_ProtocolMessages__092
title: Reject non-array trusted_authorities values.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__092.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1.1, 8.5"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.trusted-authorities-values-non-array
evidence:
  null_value: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.null_value }
  true_value: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.true_value }
  false_value: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.false_value }
  zero_value: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.zero_value }
  random_number: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.random_number }
  string_value: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.string_value }
  object_value: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.object_value }
  visual_evidence: { from: pipeline.dcql.trusted-authorities-values-non-array.outputs.visual_evidence }
assertions:
  - { id: null_values_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.null_value, params: { mode: trusted_authority_property_type, property: values, expected_type: array, valid: false } }
  - { id: true_values_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.true_value, params: { mode: trusted_authority_property_type, property: values, expected_type: array, valid: false } }
  - { id: false_values_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.false_value, params: { mode: trusted_authority_property_type, property: values, expected_type: array, valid: false } }
  - { id: zero_values_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.zero_value, params: { mode: trusted_authority_property_type, property: values, expected_type: array, valid: false } }
  - { id: random_number_values_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.random_number, params: { mode: trusted_authority_property_type, property: values, expected_type: array, valid: false } }
  - { id: string_values_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.string_value, params: { mode: trusted_authority_property_type, property: values, expected_type: array, valid: false } }
  - { id: object_values_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.object_value, params: { mode: trusted_authority_property_type, property: values, expected_type: array, valid: false } }
  - id: every_non_array_variant_has_visual_evidence
    validator: evidence.minimum_items
    input: evidence.visual_evidence
    params: { min_items: 7 }
verdict:
  pass_when: all_assertions_pass
