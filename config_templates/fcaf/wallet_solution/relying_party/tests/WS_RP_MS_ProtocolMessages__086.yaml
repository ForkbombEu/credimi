id: WS_RP_MS_ProtocolMessages__086
title: Reject non-array DCQL claim_sets values.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__086.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1, 8.5"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.claim-sets-non-array
evidence:
  null_value: { from: pipeline.dcql.claim-sets-non-array.outputs.null_value }
  true_value: { from: pipeline.dcql.claim-sets-non-array.outputs.true_value }
  false_value: { from: pipeline.dcql.claim-sets-non-array.outputs.false_value }
  zero_value: { from: pipeline.dcql.claim-sets-non-array.outputs.zero_value }
  random_number: { from: pipeline.dcql.claim-sets-non-array.outputs.random_number }
  string_value: { from: pipeline.dcql.claim-sets-non-array.outputs.string_value }
  object_value: { from: pipeline.dcql.claim-sets-non-array.outputs.object_value }
  visual_evidence: { from: pipeline.dcql.claim-sets-non-array.outputs.visual_evidence }
assertions:
  - { id: claim_sets_null_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.null_value, params: { mode: property_type, property: claim_sets, expected_type: array, valid: false } }
  - { id: claim_sets_true_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.true_value, params: { mode: property_type, property: claim_sets, expected_type: array, valid: false } }
  - { id: claim_sets_false_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.false_value, params: { mode: property_type, property: claim_sets, expected_type: array, valid: false } }
  - { id: claim_sets_zero_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.zero_value, params: { mode: property_type, property: claim_sets, expected_type: array, valid: false } }
  - { id: claim_sets_random_number_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.random_number, params: { mode: property_type, property: claim_sets, expected_type: array, valid: false } }
  - { id: claim_sets_string_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.string_value, params: { mode: property_type, property: claim_sets, expected_type: array, valid: false } }
  - { id: claim_sets_object_is_rejected, validator: dcql.response_satisfies_constraints, input: evidence.object_value, params: { mode: property_type, property: claim_sets, expected_type: array, valid: false } }
  - id: every_non_array_variant_has_visual_evidence
    validator: evidence.minimum_items
    input: evidence.visual_evidence
    params: { min_items: 7 }
verdict:
  pass_when: all_assertions_pass
