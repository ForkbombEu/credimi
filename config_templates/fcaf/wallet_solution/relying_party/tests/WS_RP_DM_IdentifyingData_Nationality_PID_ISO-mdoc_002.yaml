id: WS_RP_DM_IdentifyingData_Nationality_PID_ISO-mdoc_002
title: This test case verifies that the DataElementValue of data element `nationality` is an array of Alpha-2 country codes as specified in ISO 3166-1. Note that `nationality` is the Attribute Identifier in ISO-mdoc for the Data Identifier nationality.
source:
    path: DataModel/IdentifyingData/WS_RP_DM_IdentifyingData_Nationality_PID_ISO-mdoc_002.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.identifying_data
applicability:
    credential_format: iso_mdoc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook, paragraph 3.1.2
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_nationality_pid_iso-mdoc_002
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.1 (Table 6).'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_nationality_pid_iso-mdoc_002
    - title: RFC 7049 section 2.1
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_nationality_pid_iso-mdoc_002
preconditions:
    - ref: pipeline.pid.presentation.mdoc.all-claims-elements
    - ref: assertion.pid.presentation.mdoc.doc-type-pid
    - ref: assertion.pid.presentation.mdoc.required-mandatory-elements-presented
    - ref: test.WS_RP_DM_IdentifyingData_Nationality_PID_ISO-mdoc_001
evidence:
    pid_mdoc:
        from: pipeline.pid.presentation.mdoc.all-claims-elements.outputs.pid_mdoc
assertions:
    - id: nationality_strings
      validator: mdoc.element_string_array
      input: evidence.pid_mdoc
      params:
        element: nationality
        min_items: 1
        namespace: eu.europa.ec.eudi.pid.1
verdict:
    pass_when: all_assertions_pass
