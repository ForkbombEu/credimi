id: WS_RP_DM_IdentifyingData_Familyname_PID_IETF-sd-jwt-vc_001
title: This test case verifies that the claim `family_name` is present in the Credential in IETF SD-JWT VC format. Note that `family_name` is the Attribute Identifier in IETF SD-JWT VC for the Data Identifier family_name.
source:
    path: DataModel/IdentifyingData/WS_RP_DM_IdentifyingData_Familyname_PID_IETF-sd-jwt-vc_001.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.identifying_data
applicability:
    credential_format: ietf_sd_jwt_vc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_familyname_pid_ietf-sd-jwt-vc_001
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.2 (Table 1).'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_identifyingdata_familyname_pid_ietf-sd-jwt-vc_001
preconditions:
    - ref: pipeline.pid.presentation.sdjwt.all-claims
    - ref: assertion.pid.presentation.sdjwt.vct-pid
    - ref: assertion.pid.presentation.sdjwt.required-mandatory-claims-presented
evidence:
    pid_sdjwt:
        from: pipeline.pid.presentation.sdjwt.all-claims.outputs.pid_sdjwt
assertions:
    - id: family_name_present
      validator: sdjwt.claim_present
      input: evidence.pid_sdjwt
      params:
        claim: family_name
verdict:
    pass_when: all_assertions_pass
