id: WS_RP_IA_Supportive__001
title: Verify the wallet follows the redirect URI returned after direct_post.
source:
  path: Interaction/Supportive/WS_RP_IA_Supportive__001.md
suite:
  sut: wallet_solution
  role: relying_party
  section: interaction.supportive
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "8.3"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.wallet.supportive.redirect-uri
evidence:
  wallet_response:
    from: pipeline.wallet.supportive.redirect-uri.outputs.wallet_response
assertions:
  - id: authorization_response_posted_before_redirect
    validator: json.field_required
    input: evidence.wallet_response
    params:
      field: vp_token
verdict:
  pass_when: all_assertions_pass
