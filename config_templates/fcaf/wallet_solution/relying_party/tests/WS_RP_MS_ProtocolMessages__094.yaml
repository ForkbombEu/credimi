id: WS_RP_MS_ProtocolMessages__094
title: Reject trusted_authorities values containing an empty string.
source:
  path: MessageStructure/ProtocolMessages/WS_RP_MS_ProtocolMessages__094.md
suite:
  sut: wallet_solution
  role: relying_party
  section: message_structure.protocol_messages
applicability:
  profile: EUDI_generic
  presentation_flow: redirects
normative_references:
  - title: OpenID for Verifiable Presentations 1.0
    section: "6.1.1, 8.5"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.trusted-authorities-values-empty-string
evidence:
  single_value: { from: pipeline.dcql.trusted-authorities-values-empty-string.outputs.single_value }
  mixed_value: { from: pipeline.dcql.trusted-authorities-values-empty-string.outputs.mixed_value }
  visual_evidence: { from: pipeline.dcql.trusted-authorities-values-empty-string.outputs.visual_evidence }
assertions:
  - id: single_empty_string_is_rejected
    validator: dcql.response_satisfies_constraints
    input: evidence.single_value
    params: { mode: trusted_authority_empty_string_item, property: values }
  - id: mixed_empty_string_is_rejected
    validator: dcql.response_satisfies_constraints
    input: evidence.mixed_value
    params: { mode: trusted_authority_empty_string_item, property: values }
  - id: every_empty_string_variant_has_visual_evidence
    validator: evidence.minimum_items
    input: evidence.visual_evidence
    params: { min_items: 2 }
verdict:
  pass_when: all_assertions_pass
