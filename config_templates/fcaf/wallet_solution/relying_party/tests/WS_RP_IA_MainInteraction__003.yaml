id: WS_RP_IA_MainInteraction__003
title: Match credentials when DCQL query includes valid trusted_authorities.
source:
  path: Interaction/MainInteraction/WS_RP_IA_MainInteraction__003.md
suite:
  sut: wallet_solution
  role: relying_party
  section: interaction.main_interaction
applicability:
  profile: EUDI_generic
normative_references:
  - title: OpenID for Verifiable Presentations
    section: "6.1"
    url: https://openid.net/specs/openid-4-verifiable-presentations-1_0.html
preconditions:
  - ref: pipeline.dcql.trusted-authorities-match
evidence:
  dcql_exchange:
    from: pipeline.dcql.trusted-authorities-match.outputs.dcql_exchange
  visual_evidence:
    from: pipeline.dcql.trusted-authorities-match.outputs.visual_evidence
assertions:
  - id: every_returned_credential_issuer_matches_a_trusted_authority
    validator: dcql.response_satisfies_constraints
    input: evidence.dcql_exchange
    params:
      mode: trusted_authorities_match
  - id: presentation_has_visual_evidence
    validator: evidence.non_empty
    input: evidence.visual_evidence
verdict:
  pass_when: all_assertions_pass
