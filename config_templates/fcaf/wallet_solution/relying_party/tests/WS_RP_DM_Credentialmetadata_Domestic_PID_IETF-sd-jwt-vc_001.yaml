id: WS_RP_DM_Credentialmetadata_Domestic_PID_IETF-sd-jwt-vc_001
title: This test case verifies domestic elements in an appropriate namespace are present, if these have been indicated in the ICS.
source:
    path: DataModel/CredentialMetadata/WS_RP_DM_Credentialmetadata_Domestic_PID_IETF-sd-jwt-vc_001.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.credential_metadata
applicability:
    credential_format: ietf_sd_jwt_vc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_domestic_pid_ietf-sd-jwt-vc_001
    - title: '"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.2.'
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_domestic_pid_ietf-sd-jwt-vc_001
preconditions:
    - ref: pipeline.pid.presentation.sdjwt.all-claims
    - ref: assertion.pid.presentation.sdjwt.vct-pid
    - ref: assertion.pid.presentation.sdjwt.required-mandatory-claims-presented
evidence:
    pid_sdjwt:
        from: pipeline.pid.presentation.sdjwt.all-claims.outputs.pid_sdjwt
assertions:
    - id: domestic_claims_present
      validator: sdjwt.domestic_namespace
      input: evidence.pid_sdjwt
verdict:
    pass_when: all_assertions_pass
