id: WS_RP_DM_Credentialmetadata_Issuingjurisdiction_PID_IETF-sd-jwt-vc_003
title: This test case verifies that the value of the claim `issuing_jurisdiction` contains a valid country subdivision code. Note that `issuing_jurisdiction` is the Attribute Identifier in IETF SD-JWT VC for the Data Identifier issuing_jurisdiction.
source:
    path: DataModel/CredentialMetadata/WS_RP_DM_Credentialmetadata_Issuingjurisdiction_PID_IETF-sd-jwt-vc_003.md
suite:
    sut: wallet_solution
    role: relying_party
    section: data_model.credential_metadata
applicability:
    credential_format: ietf_sd_jwt_vc
    document_type: pid
normative_references:
    - title: European Digital Identity Wallet, ARF 2.0, Annex 3.01 pid rulebook,"ANNEXES to the COMMISSION IMPLEMENTING REGULATION amending Implementing Regulation (EU) 2024/2977, (EU) 2024/2979, (EU) 2024/2980 and (EU) 2024/2982 as regards applicable standards and specifications and correcting Implementing Regulation (EU) 2024/2980" section 4.2 (Table 5).
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_issuingjurisdiction_pid_ietf-sd-jwt-vc_003
    - title: ISO 3166-2:2020, 8
      url: https://conformance.eudi.dev/latest/fcaf/suts/wallet_solution/relying_party/ws_rp/#ws_rp_dm_credentialmetadata_issuingjurisdiction_pid_ietf-sd-jwt-vc_003
preconditions:
    - ref: pipeline.pid.presentation.sdjwt.all-claims
    - ref: assertion.pid.presentation.sdjwt.vct-pid
    - ref: assertion.pid.presentation.sdjwt.required-mandatory-claims-presented
    - ref: test.WS_RP_DM_Credentialmetadata_Issuingjurisdiction_PID_IETF-sd-jwt-vc_001
evidence:
    pid_sdjwt:
        from: pipeline.pid.presentation.sdjwt.all-claims.outputs.pid_sdjwt
assertions:
    - id: issuing_jurisdiction_semantic
      validator: sdjwt.claim_country_subdivision
      input: evidence.pid_sdjwt
      params:
        claim: issuing_jurisdiction
        country_claim: issuing_country
verdict:
    pass_when: all_assertions_pass
