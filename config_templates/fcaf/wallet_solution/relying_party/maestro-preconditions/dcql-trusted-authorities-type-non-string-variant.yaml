appId: eu.europa.ec.euidi
---
- stopApp
- launchApp: { clearState: false }
- runFlow: { file: unlock-wallet.yaml }
- evalScript: ${output.typeValue = eval(TYPE_VALUE)}
- evalScript: ${output.dcqlQuery = JSON.stringify({credentials:[{id:'pididentity01',format:'dc+sd-jwt',meta:{vct_values:['urn:eudi:pid:1']},claims:[{path:['given_name']}],trusted_authorities:[{type:output.typeValue,values:['authority-key-id']}]}]})}
- evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=redirect_uri%3Ahttps%3A%2F%2Fexample.com%2Ffcaf-response&response_uri=https%3A%2F%2Fexample.com%2Ffcaf-response&response_type=vp_token&response_mode=direct_post&nonce=fcaf-091-' + VARIANT + '&dcql_query=' + encodeURIComponent(output.dcqlQuery)}
- openLink: { link: "${output.authorizationRequest}", autoVerify: false, browser: false }
- runFlow: { file: choose-eudi-wallet.yaml }
- runFlow:
    when: { visible: "Welcome back" }
    commands:
      - tapOn: { point: "11%,40%" }
      - inputText: "123456"
      - tapOn: { point: "50%,10%" }
- extendedWaitUntil: { visible: "Oups! Something went wrong|invalid_request|not available|Close|Go Back|Home|Documents", timeout: 30000 }
- takeScreenshot: fcaf-091-${VARIANT}
