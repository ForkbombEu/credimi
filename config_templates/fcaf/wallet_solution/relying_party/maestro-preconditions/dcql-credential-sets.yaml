appId: eu.europa.ec.euidi
name: FCAF precondition - DCQL credential sets
tags:
  - fcaf
  - precondition
  - dcql
  - credential-sets
---
- stopApp
- launchApp:
    clearState: false
    permissions:
      camera: allow
      notifications: allow
      all: unset
- runFlow:
    file: unlock-wallet.yaml
- openLink:
    link: "${DCQL_CREDENTIAL_SETS_DEEPLINK_URL}"
    autoVerify: false
    browser: false
- runFlow:
    file: choose-eudi-wallet.yaml
- extendedWaitUntil:
    visible: "Welcome back|Share|Cancel|Close"
    timeout: 100000
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn:
          point: "11%,40%"
      - inputText: "123456"
- extendedWaitUntil:
    visible: "Share|Cancel|Close"
    timeout: 30000
- takeScreenshot: fcaf-dcql-credential-sets-request
- runFlow:
    when:
      visible: "View details"
    commands:
      - tapOn: "View details"
      - assertVisible: "Family Name\\(s\\)"
      - assertVisible: "Given Name\\(s\\)"
      - takeScreenshot: fcaf-dcql-credential-sets-details
      - tapOn: "View details"
- runFlow:
    when:
      visible: "Share"
    commands:
      - tapOn: "Share"
      - extendedWaitUntil:
          visible: "Welcome back|To approve the transaction you need to verify your identity."
          timeout: 100000
      - tapOn:
          point: "11%,40%"
      - inputText: "123456"
      - tapOn: { point: "50%,10%" }
- assertNotVisible:
    text: "Oups! Something went wrong"
- extendedWaitUntil:
    visible: "Close"
    timeout: 30000
- takeScreenshot: fcaf-dcql-credential-sets-complete
- tapOn: "Close"
