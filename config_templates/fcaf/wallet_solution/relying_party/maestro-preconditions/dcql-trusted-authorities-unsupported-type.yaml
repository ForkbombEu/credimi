appId: eu.europa.ec.euidi
name: FCAF precondition - unsupported trusted authorities type
tags: [fcaf, precondition, dcql, trusted-authorities]
---
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil: { visible: "Home|Documents|Welcome, .*", timeout: 30000 }
- evalScript: ${output.dcqlQuery = JSON.stringify({credentials:[{id:'pididentity01',format:'dc+sd-jwt',meta:{vct_values:['urn:eudi:pid:1']},claims:[{path:['given_name']}],trusted_authorities:[{type:'unsupported',values:['https://example.com/authority'] }]}]})}
- evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=redirect_uri%3Ahttps%3A%2F%2Fexample.com%2Ffcaf-response&response_uri=https%3A%2F%2Fexample.com%2Ffcaf-response&response_type=vp_token&response_mode=direct_post&nonce=fcaf-088-trusted-authorities-unsupported-type&dcql_query=' + encodeURIComponent(output.dcqlQuery)}
- openLink: { link: "${output.authorizationRequest}", autoVerify: false, browser: false }
- extendedWaitUntil: { visible: "Oups! Something went wrong|invalid_request|not available|Close|Go Back", timeout: 30000 }
- takeScreenshot: fcaf-088-trusted-authorities-unsupported-type-rejected
- runFlow:
    when:
      visible: "Go Back"
    commands:
      - tapOn: "Go Back"
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
