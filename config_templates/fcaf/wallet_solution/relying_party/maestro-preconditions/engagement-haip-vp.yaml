appId: eu.europa.ec.euidi
name: FCAF precondition - HAIP VP wallet engagement
tags:
  - fcaf
  - precondition
  - engagement
  - haip-vp
---
- stopApp
- openLink:
    link: "${HAIP_VP_PRESENTATION_URL}"
    autoVerify: false
    browser: false
- runFlow:
    file: choose-eudi-wallet.yaml
- extendedWaitUntil:
    visible: "Welcome back|Share|Cancel|Close"
    timeout: 100000
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn:
          point: "11%,40%"
      - inputText: "123456"
- extendedWaitUntil:
    visible: "Share"
    timeout: 30000
- assertVisible: "Share"
- takeScreenshot: fcaf-engagement-haip-vp-invoked
- back
