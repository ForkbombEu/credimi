appId: eu.europa.ec.euidi
name: FCAF precondition - DCQL no matching credentials
tags:
  - fcaf
  - precondition
  - dcql
  - no-matching-credentials
---
- stopApp
- launchApp:
    clearState: false
    permissions:
      camera: allow
      notifications: allow
      all: unset
- runFlow:
    file: unlock-wallet.yaml
- openLink:
    link: "${DCQL_NO_MATCHING_CREDENTIALS_DEEPLINK_URL}"
    autoVerify: false
    browser: false
- runFlow:
    file: choose-eudi-wallet.yaml
- extendedWaitUntil:
    visible: "Welcome back|The requested document is not available in your EUDI Wallet.*|Cancel|Close"
    timeout: 100000
- runFlow:
    when:
      visible: "Welcome back"
    commands:
      - tapOn:
          point: "11%,40%"
      - inputText: "123456"
- extendedWaitUntil:
    visible: "The requested document is not available in your EUDI Wallet.*|Cancel|Close"
    timeout: 30000
- takeScreenshot: fcaf-dcql-no-matching-credentials
- runFlow:
    when:
      visible: "The requested document is not available in your EUDI Wallet.*"
    commands:
      - tapOn: "Go Back"
- runFlow:
    when:
      visible: "Cancel"
    commands:
      - tapOn: "Cancel"
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
