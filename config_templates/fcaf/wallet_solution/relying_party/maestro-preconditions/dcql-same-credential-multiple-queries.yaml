appId: eu.europa.ec.euidi
name: FCAF precondition - same credential multiple queries
tags: [fcaf, precondition, dcql, multiple-queries]
---
- stopApp
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Close sheet"
    commands:
      - tapOn: { point: "50%,20%" }
- extendedWaitUntil: { visible: "Home|Documents|Welcome, .*", timeout: 30000 }
- openLink: { link: "${DCQL_SAME_CREDENTIAL_MULTIPLE_QUERIES_URL}", autoVerify: false, browser: false }
- runFlow: { file: choose-eudi-wallet.yaml }
- extendedWaitUntil: { visible: "DATA SHARING REQUEST", timeout: 100000 }
- assertVisible: { id: eu.europa.ec.euidi:id/request_screen_requested_document_0 }
- assertVisible: { id: eu.europa.ec.euidi:id/request_screen_requested_document_1 }
- tapOn: { id: eu.europa.ec.euidi:id/request_screen_requested_document_0 }
- assertVisible: { text: "Given Name(s)", index: 0 }
- assertVisible: { text: "Given Name(s)", index: 1 }
- takeScreenshot: fcaf-087-same-credential-multiple-queries-expanded
- tapOn: "Share"
- extendedWaitUntil: { visible: "PIN", timeout: 30000 }
- tapOn: { point: "11%,39%" }
- inputText: "123456"
- tapOn: { point: "50%,10%" }
- extendedWaitUntil: { visible: ".*successfully shared.*", timeout: 30000 }
- assertVisible: "EUDI Remote Verifier"
- assertVisible: { id: eu.europa.ec.euidi:id/document_success_screen_document_0 }
- assertVisible: { id: eu.europa.ec.euidi:id/document_success_screen_document_1 }
- tapOn: { id: eu.europa.ec.euidi:id/document_success_screen_document_0 }
- tapOn: { id: eu.europa.ec.euidi:id/document_success_screen_document_1 }
- assertVisible: { text: "Given Name(s)", index: 0 }
- assertVisible: { text: "Given Name(s)", index: 1 }
- assertVisible: { text: "Filippo", index: 0 }
- assertVisible: { text: "Filippo", index: 1 }
- takeScreenshot: fcaf-087-same-credential-multiple-queries
- tapOn: "Close"
