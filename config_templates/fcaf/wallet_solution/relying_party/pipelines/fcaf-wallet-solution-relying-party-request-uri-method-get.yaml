name: FCAF wallet relying-party Request URI method GET
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy:
        maximum_attempts: 1

steps:
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: ${fixture.verifier_url}/ui/presentations
      expected_status: 200
      headers:
        Content-Type: application/json
      body:
        type: vp_token
        nonce: fcaf-request-uri-method-get
        request_uri_method: get
        dcql_query:
          credentials:
            - id: pid_mdoc
              format: mso_mdoc
              meta:
                doctype_value: eu.europa.ec.eudi.pid.1
              claims:
                - path:
                    - eu.europa.ec.eudi.pid.1
                    - given_name
                - path:
                    - eu.europa.ec.eudi.pid.1
                    - family_name

  - id: submit-request-uri-method-get
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID: ${{ create-presentation.outputs.body.client_id }}
        REQUEST_URI: ${{ create-presentation.outputs.body.request_uri }}
        REQUEST_URI_METHOD: ${{ create-presentation.outputs.body.request_uri_method }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - stopApp
        - evalScript: ${output.authorizationRequest = 'haip-vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI) + '&request_uri_method=' + encodeURIComponent(env.REQUEST_URI_METHOD)}
        - openLink:
            link: ${output.authorizationRequest}
            autoVerify: false
            browser: false
        - waitForAnimationToEnd:
            timeout: 5000
        - tapOn:
            text: "EUDI Wallet"
            optional: true
        - tapOn:
            text: "Just once"
            optional: true
        - extendedWaitUntil:
            visible: "Welcome back|Share|Cancel|Close"
            timeout: 100000
        - runFlow:
            when:
              visible: "Welcome back"
            commands:
              - tapOn:
                  point: "11%,40%"
              - inputText: "123456"
        - extendedWaitUntil:
            visible: "Share"
            timeout: 30000
        - tapOn:
            text: "Share"
            enabled: true
        - extendedWaitUntil:
            visible: "verify your identity|PIN"
            timeout: 30000
        - inputText: "123456"
        - extendedWaitUntil:
            visible: "Close"
            timeout: 30000
        - assertVisible: "Close"
        - takeScreenshot: fcaf-request-uri-method-get-submitted

  - id: get-presentation-result
    use: http-request
    with:
      method: GET
      url: ${fixture.verifier_url}/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}
      expected_status: 200
