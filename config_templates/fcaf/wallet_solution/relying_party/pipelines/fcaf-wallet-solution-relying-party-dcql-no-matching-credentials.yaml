name: FCAF wallet relying-party DCQL no matching credentials
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy:
        maximum_attempts: 1

steps:
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: ${fixture.verifier_url}/ui/presentations
      expected_status: 200
      headers:
        Content-Type: application/json
      body:
        type: vp_token
        nonce: fcaf-dcql-no-matching-credentials
        dcql_query:
          credentials:
            - id: unavailable_pid
              format: dc+sd-jwt
              meta:
                vct_values:
                  - urn:credimi:fcaf:no-matching-test-credential
              claims:
                - path:
                    - not_available_in_reference_wallet

  - id: present-with-reference-implementation
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID: ${{ create-presentation.outputs.body.client_id }}
        REQUEST_URI: ${{ create-presentation.outputs.body.request_uri }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - clearState: com.android.chrome
        - launchApp:
            stopApp: true
            clearState: false
            permissions:
              camera: allow
              notifications: allow
              all: unset
        - runFlow:
            file: unlock-wallet.yaml
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink:
            link: ${output.authorizationRequest}
            autoVerify: false
            browser: false
        - runFlow:
            file: choose-eudi-wallet.yaml
        - runFlow:
            when:
              visible: "Welcome back"
            commands:
              - tapOn:
                  point: "11%,40%"
              - tapOn: { text: "1", retryTapIfNoChange: false }
              - tapOn: { text: "2", retryTapIfNoChange: false }
              - tapOn: { text: "3", retryTapIfNoChange: false }
              - tapOn: { text: "4", retryTapIfNoChange: false }
              - tapOn: { text: "5", retryTapIfNoChange: false }
              - tapOn: { text: "6", retryTapIfNoChange: false, waitToSettleTimeoutMs: 0 }
        - waitForAnimationToEnd:
            timeout: 5000
        - extendedWaitUntil:
            visible: "The requested document is not available in your EUDI Wallet.*"
            timeout: 30000
        - assertNotVisible:
            id: eu.europa.ec.euidi:id/request_screen_requested_document_0
        - takeScreenshot: fcaf-147-no-matching-credential-access-denied
        - tapOn: "Go Back"

  - id: http-get-verifier-backend.eudiw.dev-0006
    use: http-request
    with:
      method: GET
      url: ${fixture.verifier_url}/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}
      expected_status: 200
