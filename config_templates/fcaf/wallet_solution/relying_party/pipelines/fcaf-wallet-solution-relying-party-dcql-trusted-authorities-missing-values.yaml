name: FCAF wallet relying-party DCQL trusted authorities missing values
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy: { maximum_attempts: 1 }
steps:
  - id: evidence-missing-trusted-authorities-values
    use: json-parse
    with:
      rawJSON: '{"trusted_authority":{"type":"aki"},"dcql_query":{"credentials":[{"id":"pididentity01","format":"dc+sd-jwt","meta":{"vct_values":["urn:eudi:pid:1"]},"claims":[{"path":["given_name"]}],"trusted_authorities":[{"type":"aki"}]}]}}'
      struct_type: map
  - id: reject-missing-trusted-authorities-values
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - stopApp
        - launchApp: { clearState: false }
        - extendedWaitUntil: { visible: "Welcome back|Home|Documents|Add document|Welcome, .*", timeout: 30000 }
        - runFlow:
            when: { visible: "Welcome back" }
            commands:
              - tapOn: { point: "11%,40%" }
              - inputText: "123456"
              - tapOn: { point: "50%,10%" }
        - evalScript: ${output.dcqlQuery = JSON.stringify({credentials:[{id:'pididentity01',format:'dc+sd-jwt',meta:{vct_values:['urn:eudi:pid:1']},claims:[{path:['given_name']}],trusted_authorities:[{type:'aki'}]}]})}
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=redirect_uri%3Ahttps%3A%2F%2Fexample.com%2Ffcaf-response&response_uri=https%3A%2F%2Fexample.com%2Ffcaf-response&response_type=vp_token&response_mode=direct_post&nonce=fcaf-090-trusted-authorities-missing-values&dcql_query=' + encodeURIComponent(output.dcqlQuery)}
        - openLink: { link: "${output.authorizationRequest}", autoVerify: false, browser: false }
        - runFlow:
            when: { visible: "Welcome back" }
            commands:
              - tapOn: { point: "11%,40%" }
              - inputText: "123456"
              - tapOn: { point: "50%,10%" }
        - extendedWaitUntil: { visible: "Oups! Something went wrong|invalid_request|not available|Close|Go Back|Home|Documents", timeout: 30000 }
        - takeScreenshot: fcaf-090-trusted-authorities-missing-values-rejected
        - back
outputs:
  trusted_authority: { path: $.output.evidence-missing-trusted-authorities-values.outputs.trusted_authority, decoder: raw }
  dcql_exchange: { path: $.output.evidence-missing-trusted-authorities-values.outputs, decoder: raw }
  visual_evidence: { path: $.output.reject-missing-trusted-authorities-values.outputs.screenshot_urls, decoder: raw }
failure_policy: fail_dependent_preconditions_and_tests
