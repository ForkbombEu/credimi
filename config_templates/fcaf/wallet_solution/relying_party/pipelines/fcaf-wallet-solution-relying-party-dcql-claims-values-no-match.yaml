name: FCAF DCQL mismatched claim values
runtime: { global_runner_id: "" }
steps:
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: ${fixture.verifier_url}/ui/presentations
      expected_status: 200
      headers: { Content-Type: application/json }
      body: { type: vp_token, nonce: fcaf-107, dcql_query: { credentials: [{ id: pid, format: dc+sd-jwt, meta: { vct_values: [urn:eu.europa.ec.eudi:pid:1] }, claims: [{ path: [given_name], values: [value-that-does-not-match] }] }] } }
  - id: reject-mismatched-claim-values
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters: { CLIENT_ID: "${{ create-presentation.outputs.body.client_id }}", REQUEST_URI: "${{ create-presentation.outputs.body.request_uri }}" }
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - clearState: com.android.chrome
        - launchApp: { stopApp: true, clearState: false }
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink: { link: ${output.authorizationRequest}, autoVerify: false, browser: false }
        - waitForAnimationToEnd: { timeout: 5000 }
        - takeScreenshot: fcaf-107
  - id: fetch-result
    use: http-request
    with: { method: GET, url: "${fixture.verifier_url}/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}", expected_status: 200 }
