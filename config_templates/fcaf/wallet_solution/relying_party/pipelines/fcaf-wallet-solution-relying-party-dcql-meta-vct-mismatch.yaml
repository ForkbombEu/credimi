name: FCAF wallet relying-party DCQL meta VCT mismatch
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy:
        maximum_attempts: 1

steps:
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: ${fixture.verifier_url}/ui/presentations
      expected_status: 200
      headers:
        Content-Type: application/json
      body:
        type: vp_token
        nonce: fcaf-dcql-meta-vct-mismatch
        dcql_query:
          credentials:
            - id: pididentity01
              format: dc+sd-jwt
              meta:
                vct_values:
                  - urn:credimi:fcaf:not-the-wallet-pid
              claims:
                - path:
                    - given_name
                - path:
                    - family_name

  - id: present-with-reference-implementation
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID: ${{ create-presentation.outputs.body.client_id }}
        REQUEST_URI: ${{ create-presentation.outputs.body.request_uri }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - launchApp:
            stopApp: false
            clearState: false
            permissions:
              camera: allow
              notifications: allow
              all: unset
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink:
            link: ${output.authorizationRequest}
            autoVerify: false
            browser: false
        - waitForAnimationToEnd:
            timeout: 5000
        - takeScreenshot: fcaf-dcql-meta-vct-mismatch
        - tapOn:
            text: "(?i)(cancel|reject|close)"
            optional: true
        - waitForAnimationToEnd:
            timeout: 5000

  - id: get-presentation-result
    use: http-request
    with:
      method: GET
      url: ${fixture.verifier_url}/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}
      expected_status: 200
