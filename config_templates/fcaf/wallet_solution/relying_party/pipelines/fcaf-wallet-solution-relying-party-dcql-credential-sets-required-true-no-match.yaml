name: FCAF DCQL credential_sets required true no match
runtime: { global_runner_id: "" }
steps:
  - id: create-capture-session
    use: http-request
    with:
      method: POST
      url: https://beta-capture-wallet.credimi.io/openid4vp/sessions
      expected_status: 201
      headers: { Content-Type: application/json }
      body: { response_mode: direct_post, presentation_request: { nonce: fcaf-102, dcql_query: { credentials: [{ id: missing_pid, format: dc+sd-jwt, meta: { vct_values: [urn:missing] } }], credential_sets: [{ required: true, options: [[missing_pid]] }] } } }
  - id: reject-required-credential-set
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters: { DEEPLINK: "${{ create-capture-session.outputs.body.deeplink }}" }
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - clearState: com.android.chrome
        - launchApp: { stopApp: true, clearState: false, permissions: { camera: allow, notifications: allow, all: unset } }
        - runFlow: { file: unlock-wallet.yaml }
        - openLink: { link: "${DEEPLINK}", autoVerify: false, browser: false }
        - runFlow: { file: choose-eudi-wallet.yaml }
        - extendedWaitUntil: { visible: "Oups! Something went wrong|Error|invalid request|Something went wrong|Home|Documents", timeout: 100000 }
        - takeScreenshot: fcaf-102
  - id: fetch-capture-session
    use: http-request
    with: { method: GET, url: "https://beta-capture-wallet.credimi.io/openid4vp/sessions/${{ create-capture-session.outputs.body.session_id }}", expected_status: 200 }
