name: FCAF wallet relying-party same credential multiple queries
runtime:
  global_runner_id: ""
  temporal:
    activity_options: { schedule_to_close_timeout: 50m, start_to_close_timeout: 50m, retry_policy: { maximum_attempts: 1 } }
steps:
  - id: evidence-request
    use: json-parse
    with:
      rawJSON: '{"dcql_query":{"credentials":[{"id":"pid-query-one","format":"dc+sd-jwt","meta":{"vct_values":["urn:eudi:pid:1"]},"claims":[{"path":["given_name"]}]},{"id":"pid-query-two","format":"dc+sd-jwt","meta":{"vct_values":["urn:eudi:pid:1"]},"claims":[{"path":["given_name"]}]}]}}'
      struct_type: map
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: https://verifier-backend.eudiw.dev/ui/presentations
      expected_status: 200
      headers: { Content-Type: application/json }
      body:
        type: vp_token
        nonce: fcaf-087-same-credential-multiple-queries
        dcql_query:
          credentials:
            - { id: pid-query-one, format: dc+sd-jwt, meta: { vct_values: [urn:eudi:pid:1] }, claims: [{ path: [given_name] }] }
            - { id: pid-query-two, format: dc+sd-jwt, meta: { vct_values: [urn:eudi:pid:1] }, claims: [{ path: [given_name] }] }
  - id: present-and-share
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID: ${{ create-presentation.outputs.body.client_id }}
        REQUEST_URI: ${{ create-presentation.outputs.body.request_uri }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - extendedWaitUntil: { visible: "Home|Documents|Welcome, .*", timeout: 30000 }
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink:
            link: ${output.authorizationRequest}
            autoVerify: false
            browser: false
        - extendedWaitUntil: { visible: "DATA SHARING REQUEST", timeout: 100000 }
        - assertVisible: { id: eu.europa.ec.euidi:id/request_screen_requested_document_0 }
        - assertVisible: { id: eu.europa.ec.euidi:id/request_screen_requested_document_1 }
        - tapOn: "Share"
        - extendedWaitUntil: { visible: "PIN", timeout: 30000 }
        - tapOn: { point: "11%,39%" }
        - inputText: "123456"
        - tapOn: { point: "50%,10%" }
        - extendedWaitUntil: { visible: ".*successfully shared.*", timeout: 30000 }
        - takeScreenshot: fcaf-087-same-credential-multiple-queries
        - tapOn: "Close"
  - id: get-presentation-result
    use: http-request
    with:
      method: GET
      url: https://verifier-backend.eudiw.dev/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}
      expected_status: 200
