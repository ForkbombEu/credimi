name: FCAF wallet relying-party DCQL credential_sets options missing
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy: { maximum_attempts: 1 }
steps:
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: https://verifier-backend.eudiw.dev/ui/presentations
      expected_status: 200
      headers: { Content-Type: application/json }
      body:
        type: vp_token
        nonce: fcaf-dcql-credential-sets-options-missing
        dcql_query:
          credentials:
            - id: pid_sdjwt
              format: dc+sd-jwt
              meta:
                vct_values: [urn:eu.europa.ec.eudi:pid:1]
              claims:
                - path: [given_name]
          credential_sets:
            - required: true
  - id: reject-missing-credential-sets-options
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID: ${{ create-presentation.outputs.body.client_id }}
        REQUEST_URI: ${{ create-presentation.outputs.body.request_uri }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - launchApp:
            stopApp: false
            clearState: false
            permissions: { camera: allow, notifications: allow, all: unset }
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink: { link: ${output.authorizationRequest}, autoVerify: false, browser: false }
        - waitForAnimationToEnd: { timeout: 5000 }
        - tapOn: { text: "(?i)(continue|accept|authorize|share|present)", optional: true }
        - waitForAnimationToEnd: { timeout: 5000 }
        - takeScreenshot: fcaf-dcql-credential-sets-options-missing
  - id: fetch-result
    use: http-request
    with:
      method: GET
      url: https://verifier-backend.eudiw.dev/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}
      expected_status: 200
