name: FCAF wallet relying-party HAIP VP engagement
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy:
        maximum_attempts: 1

steps:
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: https://verifier-backend.eudiw.dev/ui/presentations
      expected_status: 200
      headers:
        Content-Type: application/json
      body:
        type: vp_token
        nonce: fcaf-engagement-haip-vp
        dcql_query:
          credentials:
            - id: pid_sdjwt
              format: dc+sd-jwt
              meta:
                vct_values:
                  - urn:eu.europa.ec.eudi:pid:1
              claims:
                - path:
                    - given_name
                - path:
                    - family_name

  - id: invoke-wallet-with-haip-vp
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID: ${{ create-presentation.outputs.body.client_id }}
        REQUEST_URI: ${{ create-presentation.outputs.body.request_uri }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - stopApp
        - evalScript: ${output.authorizationRequest = 'haip-vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink:
            link: ${output.authorizationRequest}
            autoVerify: false
            browser: false
        - waitForAnimationToEnd:
            timeout: 5000
        - tapOn:
            text: "EUDI Wallet"
            optional: true
        - tapOn:
            text: "Just once"
            optional: true
        - extendedWaitUntil:
            visible: "Welcome back|Share|Cancel|Close"
            timeout: 100000
        - runFlow:
            when:
              visible: "Welcome back"
            commands:
              - tapOn:
                  point: "11%,40%"
              - inputText: "123456"
        - extendedWaitUntil:
            visible: "Share"
            timeout: 30000
        - assertVisible: "Share"
        - takeScreenshot: fcaf-engagement-haip-vp-invoked
        - back
