name: FCAF DCQL allowed claim path components
runtime: { global_runner_id: "" }
steps:
  - id: evidence-request
    use: json-parse
    with:
      rawJSON: '{"dcql_query":{"credentials":[{"id":"pid-path-components","format":"dc+sd-jwt","meta":{"vct_values":["urn:eudi:pid:1"]},"claims":[{"id":"given-name","path":["given_name"]},{"id":"all-nationalities","path":["nationality",null]},{"id":"first-nationality","path":["nationality",0]}]}]}}'
      struct_type: map
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: https://verifier-backend.eudiw.dev/ui/presentations
      expected_status: 200
      headers: { Content-Type: application/json }
      body:
        type: vp_token
        nonce: fcaf-118
        dcql_query:
          credentials:
            - id: pid-path-components
              format: dc+sd-jwt
              meta: { vct_values: [urn:eudi:pid:1] }
              claims:
                - { id: given-name, path: [given_name] }
                - { id: all-nationalities, path: [nationality, null] }
                - { id: first-nationality, path: [nationality, 0] }
  - id: present-allowed-path-components
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters: { CLIENT_ID: "${{ create-presentation.outputs.body.client_id }}", REQUEST_URI: "${{ create-presentation.outputs.body.request_uri }}" }
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - clearState: com.android.chrome
        - launchApp: { stopApp: true, clearState: false }
        - extendedWaitUntil: { visible: "Welcome back|Home|Documents|Welcome, .*", timeout: 30000 }
        - runFlow:
            when: { visible: "Welcome back" }
            commands:
              - tapOn: { point: "11%,40%" }
              - inputText: "123456"
              - tapOn: { point: "50%,10%" }
        - extendedWaitUntil: { visible: "Home|Documents|Welcome, .*", timeout: 30000 }
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink: { link: ${output.authorizationRequest}, autoVerify: false, browser: false }
        - runFlow:
            when: { visible: "EUDI Wallet" }
            commands:
              - tapOn: { text: "EUDI Wallet", optional: true }
        - runFlow:
            when: { visible: "Just once" }
            commands:
              - tapOn: { text: "Just once", optional: true }
        - extendedWaitUntil: { visible: "Welcome back|DATA SHARING REQUEST", timeout: 100000 }
        - runFlow:
            when: { visible: "Welcome back" }
            commands:
              - tapOn: { point: "11%,39%" }
              - tapOn: { text: "1", retryTapIfNoChange: false }
              - tapOn: { text: "2", retryTapIfNoChange: false }
              - tapOn: { text: "3", retryTapIfNoChange: false }
              - tapOn: { text: "4", retryTapIfNoChange: false }
              - tapOn: { text: "5", retryTapIfNoChange: false }
              - tapOn: { text: "6", retryTapIfNoChange: false, waitToSettleTimeoutMs: 0 }
        - extendedWaitUntil: { visible: "DATA SHARING REQUEST", timeout: 100000 }
        - assertVisible: { id: eu.europa.ec.euidi:id/request_screen_requested_document_0 }
        - tapOn: { id: eu.europa.ec.euidi:id/request_screen_requested_document_0, retryTapIfNoChange: false, waitToSettleTimeoutMs: 0 }
        - runFlow:
            when: { visible: { id: eu.europa.ec.euidi:id/request_screen_requested_document_1 } }
            commands:
              - tapOn: { id: eu.europa.ec.euidi:id/request_screen_requested_document_1, retryTapIfNoChange: false, waitToSettleTimeoutMs: 0 }
        - assertVisible: "Given Name(s)"
        - takeScreenshot: fcaf-118-allowed-claim-path-components
        - assertVisible: "Nationality"
        - tapOn: "Share"
        - extendedWaitUntil: { visible: "PIN", timeout: 30000 }
        - tapOn: { point: "11%,39%" }
        - inputText: "123456"
        - tapOn: { point: "50%,10%" }
        - extendedWaitUntil: { visible: ".*successfully shared.*", timeout: 30000 }
        - assertVisible: "EUDI Remote Verifier"
        - assertVisible: { id: eu.europa.ec.euidi:id/document_success_screen_document_0 }
        - tapOn: { id: eu.europa.ec.euidi:id/document_success_screen_document_0 }
        - runFlow:
            when: { visible: { id: eu.europa.ec.euidi:id/document_success_screen_document_1 } }
            commands:
              - tapOn: { id: eu.europa.ec.euidi:id/document_success_screen_document_1 }
        - assertVisible: "Given Name(s)"
        - takeScreenshot: fcaf-118-allowed-claim-path-components-shared
        - assertVisible: "Nationality"
        - tapOn: "Close"
  - id: fetch-result
    use: http-request
    with: { method: GET, url: "https://verifier-backend.eudiw.dev/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}", expected_status: 200 }
