name: FCAF wallet relying-party DCQL holder binding type boundary
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy:
        maximum_attempts: 1

steps:
  - id: create-valid-true
    use: http-request
    with:
      method: POST
      url: https://verifier-backend.eudiw.dev/ui/presentations
      expected_status: 200
      headers:
        Content-Type: application/json
      body:
        type: vp_token
        nonce: fcaf-081-valid-true
        dcql_query:
          credentials:
            - id: pididentity01
              format: dc+sd-jwt
              meta:
                vct_values:
                  - urn:eudi:pid:1
              require_cryptographic_holder_binding: true
              claims:
                - path:
                    - given_name
                - path:
                    - family_name

  - id: create-valid-false
    use: http-request
    with:
      method: POST
      url: https://verifier-backend.eudiw.dev/ui/presentations
      expected_status: 200
      headers:
        Content-Type: application/json
      body:
        type: vp_token
        nonce: fcaf-081-valid-false
        dcql_query:
          credentials:
            - id: pididentity01
              format: dc+sd-jwt
              meta:
                vct_values:
                  - urn:eudi:pid:1
              require_cryptographic_holder_binding: false
              claims:
                - path:
                    - given_name
                - path:
                    - family_name

  - id: evidence-number-zero
    use: json-parse
    with:
      rawJSON: '{"dcql_query":{"credentials":[{"id":"pididentity01","format":"dc+sd-jwt","meta":{"vct_values":["urn:eudi:pid:1"]},"require_cryptographic_holder_binding":0,"claims":[{"path":["given_name"]},{"path":["family_name"]}]}]}}'
      struct_type: map

