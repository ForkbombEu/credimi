  - id: exercise-holder-binding-variants
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID_VALID_TRUE: ${{ create-valid-true.outputs.body.client_id }}
        REQUEST_URI_VALID_TRUE: ${{ create-valid-true.outputs.body.request_uri }}
        CLIENT_ID_VALID_FALSE: ${{ create-valid-false.outputs.body.client_id }}
        REQUEST_URI_VALID_FALSE: ${{ create-valid-false.outputs.body.request_uri }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - extendedWaitUntil:
            visible: "Home|Documents|Welcome, .*"
            timeout: 30000
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID_VALID_TRUE) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI_VALID_TRUE)}
        - openLink:
            link: ${output.authorizationRequest}
            autoVerify: false
            browser: false
        - extendedWaitUntil:
            visible: "DATA SHARING REQUEST"
            timeout: 100000
        - tapOn: "Share"
        - extendedWaitUntil:
            visible: "PIN"
            timeout: 30000
        - tapOn:
            point: "11%,39%"
        - inputText: "123456"
        - tapOn: { point: "50%,10%" }
        - extendedWaitUntil:
            visible: ".*successfully shared.*"
            timeout: 30000
        - takeScreenshot: fcaf-081-valid-true
        - tapOn: "Close"
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID_VALID_FALSE) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI_VALID_FALSE)}
