name: FCAF wallet relying-party DCQL trusted authorities match
runtime:
  global_runner_id: ""
  temporal:
    activity_options:
      schedule_to_close_timeout: 50m
      start_to_close_timeout: 50m
      retry_policy:
        maximum_attempts: 1

steps:
  - id: create-presentation
    use: http-request
    with:
      method: POST
      url: ${fixture.verifier_url}/ui/presentations
      expected_status: 200
      headers:
        Content-Type: application/json
      body:
        type: vp_token
        nonce: fcaf-dcql-trusted-authorities-match
        dcql_query:
          credentials:
            - id: pid_identity
              format: dc+sd-jwt
              meta:
                vct_values:
                  - urn:eudi:pid:1
              claims:
                - path:
                    - given_name
                - path:
                    - family_name
              trusted_authorities:
                - type: aki
                  values:
                    # AuthorityKeyId from the public EUDIW PID issuer certificate.
                    - QlBQvhC4EPCdRFyNv6sQCO4n3Ek

  - id: present-with-reference-implementation
    use: mobile-automation
    with:
      version_id: installed_from_external_source
      parameters:
        CLIENT_ID: ${{ create-presentation.outputs.body.client_id }}
        REQUEST_URI: ${{ create-presentation.outputs.body.request_uri }}
      action_code: |
        appId: eu.europa.ec.euidi
        ---
        - clearState: com.android.chrome
        - launchApp:
            stopApp: true
            clearState: false
            permissions:
              camera: allow
              notifications: allow
              all: unset
        - runFlow: { file: unlock-wallet.yaml }
        - evalScript: ${output.authorizationRequest = 'eudi-openid4vp://?client_id=' + encodeURIComponent(env.CLIENT_ID) + '&request_uri=' + encodeURIComponent(env.REQUEST_URI)}
        - openLink:
            link: ${output.authorizationRequest}
            autoVerify: false
            browser: false
        - runFlow: { file: choose-eudi-wallet.yaml }
        - extendedWaitUntil: { visible: "Welcome back|Share", timeout: 100000 }
        - runFlow:
            when: { visible: "Welcome back" }
            commands:
              - tapOn: { point: "11%,40%" }
              - inputText: "123456"
              - tapOn: { point: "50%,10%" }
        - extendedWaitUntil: { visible: "Share", timeout: 30000 }
        - tapOn: "Share"
        - extendedWaitUntil:
            visible: "Welcome back|To approve the transaction you need to verify your identity."
            timeout: 100000
        - tapOn: { point: "11%,40%" }
        - inputText: "123456"
        - tapOn: { point: "50%,10%" }
        - assertNotVisible: { text: "Oups! Something went wrong" }
        - extendedWaitUntil: { visible: "Close", timeout: 30000 }
        - takeScreenshot: fcaf-dcql-trusted-authorities-match
        - tapOn: "Close"

  - id: http-get-verifier-backend.eudiw.dev-0006
    use: http-request
    with:
      method: GET
      url: ${fixture.verifier_url}/ui/presentations/${{ create-presentation.outputs.body.transaction_id }}
      expected_status: 200
