version: "1.1"
components:
  token:
    bearer:
      token: ${{secrets.token}}

env:
  test_name: [[.test]]
  organization_id: [[.organization_id]]
  workflow_id: [[.workflow_id]]
  run_id: [[.run_id]]
  action_id: [[.action_id | toString]]

tests:
  OPENID4VP_WALLET:
    steps:
      - name: Create fake issuer credential offer
        http:
          url: https://capture-wallet.credimi.io/sessions
          method: POST
          check:
            status: 201
          captures:
            session_id:
              jsonpath: $.session_id
            fake_deeplink:
              jsonpath: $.deeplink
      - name: Get the fake issuer credential
        http:
          url: https://credimi.io/api/pipeline/mobile-flow
          method: POST
          json:
            workflow_id: ${{ env.workflow_id }}
            run_id: ${{ env.run_id }}
            organization_id: ${{ env.organization_id }}
            action_id: ${{ env.action_id }}
            action_parameters:
              deeplink: ${{ captures.fake_deeplink }}
          check:
            status: 200
      - name: Create OpenID certification test plan
        http:
          url: https://www.certification.openid.net/api/plan
          auth:
            $ref: "#/components/token"
          method: POST
          params:
            planName: oid4vp-1final-wallet-test-plan
            variant: >-
              {
                "credential_format":"sd_jwt_vc",
                "client_id_prefix":"x509_hash",
                "request_method":"request_uri_signed",
                "vp_profile":"plain_vp",
                "response_mode":"direct_post.jwt"
              }
          json:
            alias: "credimi-oid4vp-wallet-test-${{ string.uuid | fake: 7 }}"
            description: Automated OID4VP wallet conformance test via Credimi
            server:
              authorization_endpoint: openid4vp://
            client:
              dcql:
                credentials:
                  - claims:
                      - path:
                          - given_name
                      - path:
                          - family_name
                      - path:
                          - birth_date
                      - path:
                          - iss
                        values:
                          - https://capture-wallet.credimi.io
                    format: dc+sd-jwt
                    id: credential
                    meta:
                      vct_values:
                        - urn:eu.europa.ec.eudi:pid:1.jwt
              jwks:
                keys:
                  - kty: EC
                    x: xuzYGtoa5ULK3s1amwe9cIr6T4Wxh96LmSa71NLWx6M
                    "y": 4vSfUuiSvsjx6Tz6SLbSyYQ79S7No0Ee-mmngjEuCag
                    crv: P-256
                    d: c5ebTNmR9Esdzt7VBPkh9Icl6j-S4wefswqRENrAGRc
                    kid: dc7oChmwVLxtzz_0sMjvOyPI8kv5OPFlIoeCDn4Z9lw
                    use: sig
                    alg: ES256
                    x5c:
                      - 
                    x5t#S256: dc7oChmwVLxtzz_0sMjvOyPI8kv5OPFlIoeCDn4Z9lw
          check:
            status: 201
          captures:
            plan_id:
              jsonpath: $.id
      - name: Start test runner
        http:
          url: https://www.certification.openid.net/api/runner
          auth:
            $ref: "#/components/token"
          method: POST
          params:
            test: ${{ env.test_name }}
            plan: ${{ captures.plan_id }}
            variant: "{}"
          body: ""
          check:
            status: 201
          captures:
            runner_id:
              jsonpath: $.id
      - name: Start Test
        http:
          method: GET
          url: https://www.certification.openid.net/api/runner/${{captures.runner_id}}
          auth:
            $ref: "#/components/token"
          captures:
            deeplink:
              jsonpath: $.browser.urls[0]
            rid:
              jsonpath: $.id
          check:
            status: 200
            jsonpath:
              $.browser.urls[0]:
                - isString: true
                - isDefined: true
                - isNull: false
