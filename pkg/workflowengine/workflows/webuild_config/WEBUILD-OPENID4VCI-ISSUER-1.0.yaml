version: "1.1"
name: WEBUILD flow
env:
  WEBUILD_API: https://webuild.wallet-client.forkbomb.eu
tests:
  ISSUER:
    steps:
      - name: Start a session with the WEBUILD API (works for both issuer and verifier)
        http:
          url: ${{ env.WEBUILD_API }}/session
          method: POST
          json:
            sessionId: [[.session_id | toString]]
            deepLink: [[.deeplink | toString]]
          check:
            status: 200
          captures:
            result:
              body: true
